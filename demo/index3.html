<!doctype html>
<html lang="en">
  <head>
    <script src="/htmlimports.js"></script>
    <title>Gleap Demo - Standalone Components</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <link rel="icon" type="image/x-icon" href="fav.png" />
    <script src="build/cjs/index.js"></script>
    <script src="main.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #f9fafb;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 60px 20px;
      }
      .demo-container {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .demo-header { text-align: center; }
      .demo-header h1 { font-size: 1.5rem; font-weight: 700; color: #1f2937; }
      .demo-header p { font-size: 0.9rem; color: #6b7280; margin-top: 4px; }

      /* Only layout — no message styling needed, SDK components handle that */
      .chat-box {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        height: 500px;
        overflow: hidden;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .chat-messages::-webkit-scrollbar { width: 5px; }
      .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
      .chat-input {
        border-top: 1px solid #e5e7eb;
        padding: 0 12px;
      }
      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9ca3af;
        font-size: 0.9rem;
      }
      .demo-badge {
        text-align: center;
        font-size: 0.75rem;
        color: #9ca3af;
      }
      .demo-badge code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.7rem;
      }
    </style>
  </head>

  <body>
    <div class="demo-container">
      <div class="demo-header">
        <h1>Standalone Components Demo</h1>
        <p>Every SDK component used individually — zero custom message styling</p>
      </div>

      <div class="chat-box">
        <div class="chat-messages" id="messageList">
          <div class="empty-state" id="emptyState">Ask something to get started</div>
        </div>

        <div class="chat-input">
          <gleap-agent-input
            id="agentInput"
            agentId="69bbfcc283c7e579ee9b3660"
            placeholder="Type your message..."
          ></gleap-agent-input>
        </div>
      </div>

      <div class="demo-badge">
        All message rendering uses <code>&lt;gleap-agent-reply-bubble&gt;</code>,
        <code>&lt;gleap-agent-user-bubble&gt;</code>, and
        <code>&lt;gleap-agent-typing-indicator&gt;</code>
      </div>
    </div>

    <script>
      const messageList = document.getElementById('messageList');
      const agentInput = document.getElementById('agentInput');
      let emptyCleared = false;

      function clearEmpty() {
        if (!emptyCleared) {
          const el = document.getElementById('emptyState');
          if (el) el.remove();
          emptyCleared = true;
        }
      }

      function scrollBottom() {
        messageList.scrollTop = messageList.scrollHeight;
      }

      // --- User sent a message → add a user bubble + typing indicator ---
      agentInput.addEventListener('gleap-agent-message-sent', (e) => {
        clearEmpty();

        const bubble = document.createElement('gleap-agent-user-bubble');
        bubble.setAttribute('content', e.detail.content);
        messageList.appendChild(bubble);

        const typing = document.createElement('gleap-agent-typing-indicator');
        typing.setAttribute('active', 'true');
        typing.id = 'typing';
        messageList.appendChild(typing);

        scrollBottom();
      });

      // --- Streaming tokens → replace typing with a reply bubble, then update it ---
      agentInput.addEventListener('gleap-agent-token', (e) => {
        const typing = document.getElementById('typing');

        if (typing) {
          // First token: swap typing indicator for a reply bubble
          const bubble = document.createElement('gleap-agent-reply-bubble');
          bubble.id = 'streamingBubble';
          bubble.setAttribute('content', e.detail.fullResponse);
          typing.replaceWith(bubble);
        } else {
          // Subsequent tokens: update existing bubble
          const bubble = document.getElementById('streamingBubble');
          if (bubble) bubble.setAttribute('content', e.detail.fullResponse);
        }

        scrollBottom();
      });

      // --- Done → finalize ---
      agentInput.addEventListener('gleap-agent-reply-received', (e) => {
        // Remove typing if still there (no tokens were received)
        const typing = document.getElementById('typing');
        if (typing) {
          const bubble = document.createElement('gleap-agent-reply-bubble');
          bubble.setAttribute('content', e.detail.response || '');
          typing.replaceWith(bubble);
        }

        // Clear streaming id
        const streaming = document.getElementById('streamingBubble');
        if (streaming) streaming.removeAttribute('id');

        scrollBottom();
      });

      // --- Error ---
      agentInput.addEventListener('gleap-agent-error', () => {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();

        const streaming = document.getElementById('streamingBubble');
        if (streaming) streaming.removeAttribute('id');

        const errBubble = document.createElement('gleap-agent-reply-bubble');
        errBubble.setAttribute('content', 'Something went wrong. Please try again.');
        messageList.appendChild(errBubble);
        scrollBottom();
      });
    </script>
  </body>
</html>
